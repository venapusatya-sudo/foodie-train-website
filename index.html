<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dessert Story</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <h2>🍽 Dessert Story</h2>
  <button onclick="toggleLogin()">Login</button>
</header>

<!-- LOGIN POPUP -->
<div id="loginBox" class="popup">
  <h3>Login (Optional)</h3>
  <input placeholder="Name">
  <input placeholder="Phone">
  <button onclick="closeLogin()">Continue</button>
</div>

<!-- FOOD LIST -->
<section class="food-list">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908812831-38b1c4b5f0f5">
    <h3>Chicken Biryani</h3>
    <p>₹220</p>
    <button onclick="addCart('Biryani')">Add</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
    <h3>Pizza</h3>
    <p>₹250</p>
    <button onclick="addCart('Pizza')">Add</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1589308078059-be1415eab4c3">
    <h3>Burger</h3>
    <p>₹150</p>
    <button onclick="addCart('Burger')">Add</button>
  </div>

</section>

<!-- CART -->
<div class="cart">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <button onclick="order()">Place Order</button>
</div>

<!-- BOOK TABLE -->
<section>
  <h3>📅 Book Table</h3>
  <input type="date">
  <input type="time">
  <button onclick="alert('Table Booked')">Book Now</button>
</section>

<!-- REVIEWS -->
<section>
  <h3>⭐ Reviews</h3>
  <input id="name" placeholder="Your name">
  <input id="review" placeholder="Write review">
  <button onclick="addReview()">Submit</button>
  <div id="reviews"></div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/919876543210" class="whatsapp">💬</a>

<!-- NAVBAR -->
<nav>
  <a href="#">Home</a>
  <a href="menu.html">Menu</a>
</nav>

<script src="script.js"></script>

</body>
</html>
